## FAREYE DEFAULT PROPERTIE
baseUrl=https://www.amazon.in

## MOBILE PROPERTIES
platform.name = Android
device.name = Samsung galaxy S4
app.path = /apk/FarEye_v5.50.0.apk
app.package = com.fareye.app
app.activity = com.fareye.app.Login
automation.name = UiAutomator2
no.reset = false

## MOBILE IMPLICIT TIME
time.out=10

## FAREYE REACT PKG AND ACTIVITY NAME
fareye.react.package  = com.fareyereactmps
fareye.react.activity = com.fareyereactmps.MainActivity

## RETRY LIMIT VALUE
retry.limit=2
